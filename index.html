<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 30px auto; padding: 20px; }
        .task { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding: 15px 0; }
        .completed { text-decoration: line-through; color: #aaa; }
        .task-content { flex-grow: 1; margin-left: 15px; }
        input[type="text"] { padding: 8px; margin-right: 5px; }
        button { padding: 8px 15px; cursor: pointer; }
        .delete-btn { color: white; background-color: #ff4d4f; border: none; border-radius: 4px; }
        .star-btn {
            cursor: pointer;
            font-size: 1.2rem;
            margin-right: 10px;
            color: #ccc;
            border: none;
            background: none;
        }
        .star-btn.active {
            color: #fadb14;
        }
    </style>
</head>
<body>
    <h1>Todo App</h1>

    <div style="margin-bottom: 10px; text-align: right;">
        <select id="sortOrder" onchange="fetchTasks()" style="padding: 5px; border-radius: 4px;">
            <option value="desc">新しい順</option>
            <option value="asc">古い順</option>
        </select>
    </div>
    <div style="margin-bottom: 20px;">
        <input type="text" id="titleInput" placeholder="タスクのタイトル (必須)" required>
        <input type="text" id="descInput" placeholder="詳細 (任意)">
        <input type="date" id="deadlineInput" style="padding: 8px;">
        <button onclick="addTask()">追加</button>
        <button onclick="exportTasks()" style="margin-left: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; padding: 8px 15px; cursor: pointer;">⬇ エクスポート</button>
    </div>
    
    <div id="taskList"></div>

    <div id="editModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
        <div style="background-color: white; padding: 20px; border-radius: 8px; width: 80%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="margin-top: 0;">タスクの編集</h3>
            <input type="hidden" id="editIdInput">
            <input type="text" id="editTitleInput" style="width: 100%; box-sizing: border-box; margin-bottom: 10px;" placeholder="タイトル (必須)">
            <input type="text" id="editDescInput" style="width: 100%; box-sizing: border-box; margin-bottom: 20px;" placeholder="詳細 (任意)">
            <div style="text-align: right;">
                <button onclick="closeEditModal()" style="background-color: #ccc; color: black; border: none; border-radius: 4px;">キャンセル</button>
                <button onclick="saveEdit()" style="background-color: #4CAF50; color: white; border: none; border-radius: 4px; margin-left: 10px;">保存</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/tasks';

        // タスク一覧を取得して表示
        async function fetchTasks() {
            // プルダウンから「新しい順(desc)」か「古い順(asc)」かを取得
            const order = document.getElementById('sortOrder').value;
            
            // URLの末尾に ?order=desc のように条件をくっつけてバックエンドに送る
            const res = await fetch(`${API_URL}?order=${order}`);
            const tasks = await res.json();
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            
            tasks.forEach(task => {
                const div = document.createElement('div');
                div.className = 'task';
                const isChecked = task.is_completed ? 'checked' : '';
                const titleClass = task.is_completed ? 'completed' : '';
                const deadlineText = task.deadline ? `期限: ${new Date(task.deadline).toLocaleDateString()}` : '';
                div.innerHTML = `
                    <button class="star-btn ${task.is_important ? 'active' : ''}" onclick="toggleStar(${task.id}, ${task.is_important})">
                        ${task.is_important ? '★' : '☆'}
                    </button>
                    <input type="checkbox" ${isChecked} onchange="toggleTask(${task.id}, this.checked)">
                    <div class="task-content ${titleClass}">
                        <strong>${task.title}</strong> <small style="color: #666; margin-left: 10px;">${deadlineText}</small><br>
                        <small>${task.description || ''}</small>
                    </div>
                    <button onclick="openEditModal(${task.id}, '${task.title}', '${task.description || ''}')" style="margin-right: 5px; background-color: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; padding: 5px 10px; cursor: pointer;">編集</button>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">削除</button>
                `;
                list.appendChild(div);
            });
        }

        // 新しいタスクを追加
        async function addTask() {
            const title = document.getElementById('titleInput').value;
            const description = document.getElementById('descInput').value;
            const deadline = document.getElementById('deadlineInput').value;
            
            if (!title) {
                alert("タスクのタイトルを入力してください。"); 
                return;
            }

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description, deadline: deadline || null })
            });
            
            document.getElementById('titleInput').value = '';
            document.getElementById('descInput').value = '';
            document.getElementById('deadlineInput').value = '';
            fetchTasks();
        }
        // タスクをJSONファイルとしてエクスポート
        function exportTasks() {
            window.location.href = API_URL + '/export';
        }

        // タスクの完了状態を切り替え
        async function toggleTask(id, isCompleted) {
            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_completed: isCompleted })
            });
            fetchTasks();
        }

        // タスクを削除
        async function deleteTask(id) {
            if (confirm("本当にこのタスクを削除しますか？")) { // 削除前の確認
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                fetchTasks();
            }
        }

        // ページ読み込み時にタスク一覧を取得
        fetchTasks();
        
        // タスクの重要度を切り替え
        async function toggleStar(id, currentStatus) {
            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_important: !currentStatus })
            });
            fetchTasks();
        }
        // タスクの内容を編集
        function openEditModal(id, currentTitle, currentDesc) {
            document.getElementById('editIdInput').value = id;
            document.getElementById('editTitleInput').value = currentTitle;
            document.getElementById('editDescInput').value = currentDesc;
            document.getElementById('editModal').style.display = 'flex'; // モーダルを表示
        }

        // モーダルを閉じる
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none'; // モーダルを隠す
        }

        // 編集内容をバックエンドに保存する
        async function saveEdit() {
            const id = document.getElementById('editIdInput').value;
            const newTitle = document.getElementById('editTitleInput').value;
            const newDesc = document.getElementById('editDescInput').value;

            if (!newTitle) {
                alert("タスクのタイトルを入力してください。");
                return;
            }

            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: newTitle, description: newDesc })
            });
            
            closeEditModal();
            fetchTasks();
        }
    </script>
</body>
</html>
